<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Studio Pro - Conversor de Voz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script
        src="https://www.paypal.com/sdk/js?client-id=BAAV43P3dbzf16075Kvnh-vWwLEtNLUSTCYPEWJQPXsDz62tV3h7ICFCvepkRdvBhMyUT3GYijDMGaLTHA&components=hosted-buttons&disable-funding=venmo&currency=USD">
    </script>
    <style>
        body {
            background-color: #FFFFFF;
            color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
		.titulo-gradiente {
		    background: linear-gradient(90deg, #ff6f61, #6a5acd); /* Colores del gradiente */
		    -webkit-background-clip: text;   /* Aplica el gradiente al texto */
		    -webkit-text-fill-color: transparent; /* Hace que el texto sea transparente para mostrar el gradiente */
		    font-weight: bold; /* Opcional: resalta más el título */
		}
        .card {
            border-radius: 15px;
            background-color: #F9F5F2;
            border: 1px solid #DDDDDD;
        }
        .btn-toggle {
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control, .form-select {
            background-color: #FFFFFF;
            border: 1px solid #DDDDDD;
            color: #313131;
        }
        .form-control:focus, .form-select:focus {
            background-color: #FFFFFF;
            color: #313131;
            border-color: #313131;
            box-shadow: none;
        }
        #playerContainer {
            border-top: 1px solid #F7F7F7;
            margin-top: 20px;
            padding-top: 20px;
        }
        .alert-custom {
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #ffc107;
            font-size: 0.9rem;
        }
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }
        .file-upload-wrapper label {
            background-color: #F7F7F7;
            border: 1px solid #DDD;
            color: #313131;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            width: 100%;
            text-align: center;
            transition: background-color 0.2s;
        }
        .file-upload-wrapper label:hover {
            background-color: #DDDDDD;
        }
        .file-upload-wrapper input[type="file"] {
            display: none;
        }
        #fileName {
            margin-left: 10px;
            font-size: 0.9rem;
            color: #aaa;
        }
        .donation-btn {
            background: linear-gradient(45deg, #ffc107, #fd7e14);
            border: none;
            color: #212529;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .donation-btn:hover {
            transform: scale(1.05);
            color: #000;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 titulo-gradiente">
  						<i class="fas fa-microphone-alt"></i> Texto a Voz
		    		</h3>
                    <!-- Área de texto -->
                    <div class="mb-3">
                        <label class="form-label small text-secondary">Tu mensaje:</label>
                        <textarea id="texto" class="form-control" rows="5" placeholder="Escribe o pega el texto que quieres convertir..."></textarea>
                    </div>

                    <!-- Subida de archivos -->
                    <div class="file-upload-wrapper mb-4">
                        <label for="fileUpload">
                            <i class="fas fa-cloud-upload-alt me-2"></i>Subir archivo (TXT, PDF, DOCX)
                        </label>
                        <input type="file" id="fileUpload" accept=".txt,.pdf,.docx">
                        <span id="fileName" class="text-secondary">Ningún archivo seleccionado</span>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label small text-secondary">Voz / Idioma:</label>
                            <select id="voz" class="form-select">
                                {% for nombre, valor in voces.items() %}
                                    <option value="{{ valor }}">{{ nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-secondary">Velocidad: <span id="val_vel" class="text-info">Normal</span></label>
                            <input type="range" id="velocidad" class="form-range" min="-50" max="50" value="0" step="10">
                        </div>
                    </div>

                    <button id="btnMain" onclick="gestionarAccion()" class="btn btn-info w-100 py-3 btn-toggle shadow">
                        <i class="fas fa-magic me-2"></i>GENERAR Y REPRODUCIR
                    </button>

                    <!-- Reproductor y descarga -->
                    <div id="playerContainer" style="display:none;" class="text-center">
                        <audio id="audioPlayer" controls style="width: 100%;"></audio>
                        <div class="mt-3">
                            <a id="downloadLink" href="#" download class="btn btn-outline-success btn-sm px-4">
                                <i class="fas fa-download me-2"></i>DESCARGAR MP3
                            </a>
                        </div>
                    </div>

                    <!-- Mensajes -->
                    <div id="infoMessage" class="alert alert-custom mt-3 small" style="display:none;"></div>

                    <!-- Botón de donación -->
                    <div id="paypal-container-WGE7RR7Y4F43Y"></div>
                    <div class="text-center mt-4">
                        <button id="donateButton" class="btn donation-btn px-5 py-2 rounded-pill shadow">
                            <i class="fab fa-paypal me-2"></i>Donar vía PayPal
                        </button>
                        <p class="text-secondary small mt-2">Apoya el desarrollo de esta herramienta ❤️</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Elementos del DOM
    const audio = document.getElementById('audioPlayer');
    const btnMain = document.getElementById('btnMain');
    const slider = document.getElementById('velocidad');
    const valVel = document.getElementById('val_vel');
    const playerContainer = document.getElementById('playerContainer');
    const downloadLink = document.getElementById('downloadLink');
    const infoMessage = document.getElementById('infoMessage');
    const fileInput = document.getElementById('fileUpload');
    const fileNameSpan = document.getElementById('fileName');
    const textoArea = document.getElementById('texto');

    // Variable para controlar si el audio actual está obsoleto
    let audioDirty = false;

    // Actualizar texto de velocidad
    slider.oninput = function() {
        let val = parseInt(this.value);
        valVel.innerText = val > 0 ? `+${val}%` : (val < 0 ? `${val}%` : "Normal");
    };

    // Marcar como "sucio" cuando cambia algún parámetro
    textoArea.addEventListener('input', () => { audioDirty = true; });
    document.getElementById('voz').addEventListener('change', () => { audioDirty = true; });
    slider.addEventListener('change', () => { audioDirty = true; });

    // --- Subida de archivos ---
    fileInput.addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) {
            fileNameSpan.textContent = 'Ningún archivo seleccionado';
            return;
        }
        fileNameSpan.textContent = file.name;

        // Mostrar estado
        mostrarInfo("Subiendo y procesando archivo...");

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || `Error ${response.status}`);
            }

            if (data.error) {
                throw new Error(data.error);
            }

            // Asignar texto extraído al textarea
            textoArea.value = data.text;
            audioDirty = true;  // El texto cambió, el audio anterior no sirve
            mostrarInfo("Archivo procesado correctamente. Texto cargado.");
        } catch (error) {
            console.error(error);
            mostrarError("Error al procesar archivo: " + error.message);
        } finally {
            // No resetear el input para que el nombre siga visible
        }
    });

    // --- Función principal de generación/reproducción ---
    async function gestionarAccion() {
        // Si el audio está sonando, lo detenemos
        if (!audio.paused && audio.src) {
            audio.pause();
            audio.currentTime = 0;
            return;
        }

        // Si ya hay un audio generado y no está "sucio", reproducir
        if (audio.src && !audioDirty) {
            try {
                await audio.play();
            } catch (e) {
                mostrarError("Reproducción automática bloqueada. Haz clic en el botón de play del reproductor.");
            }
            return;
        }

        // Generar nuevo audio
        const texto = textoArea.value.trim();
        if (!texto) {
            mostrarError("Por favor, ingresa algún texto primero.");
            return;
        }

        // Estado del botón
        btnMain.disabled = true;
        btnMain.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>PROCESANDO...';
        ocultarMensaje();

        const formData = new FormData();
        formData.append('texto', texto);
        formData.append('voz', document.getElementById('voz').value);
        const velValue = slider.value;
        formData.append('velocidad', (velValue >= 0 ? "+" : "") + velValue + "%");

        try {
            const response = await fetch('/convertir', { method: 'POST', body: formData });
            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || `Error ${response.status}`);
            }

            if (data.error) {
                throw new Error(data.error);
            }

            // Asignar nueva fuente al audio
            audio.src = data.url;
            audio.load();
            downloadLink.href = data.url;
            playerContainer.style.display = 'block';
            audioDirty = false;

            // Intentar reproducir automáticamente
            try {
                await audio.play();
            } catch (playError) {
                mostrarInfo("Reproducción automática bloqueada. Pulsa el botón de play del reproductor.");
            }

        } catch (error) {
            console.error(error);
            mostrarError("Error al generar el audio: " + error.message);
        } finally {
            btnMain.disabled = false;
        }
    }

    // --- Eventos del audio para cambiar el botón ---
    audio.onplay = () => {
        btnMain.classList.remove('btn-info');
        btnMain.classList.add('btn-danger');
        btnMain.innerHTML = '<i class="fas fa-stop me-2"></i>DETENER';
    };

    audio.onpause = () => {
        btnMain.classList.remove('btn-danger');
        btnMain.classList.add('btn-info');
        btnMain.innerHTML = '<i class="fas fa-play me-2"></i>REPRODUCIR';
    };

    audio.onended = () => {
        btnMain.classList.remove('btn-danger');
        btnMain.classList.add('btn-info');
        btnMain.innerHTML = '<i class="fas fa-redo me-2"></i>REPETIR';
    };

    audio.onerror = () => {
        mostrarError("Error al cargar el audio. Intenta de nuevo.");
        btnMain.classList.remove('btn-danger');
        btnMain.classList.add('btn-info');
        btnMain.innerHTML = '<i class="fas fa-magic me-2"></i>GENERAR Y REPRODUCIR';
    };

    // --- Donación ---
    document.getElementById('donateButton').addEventListener('click', () => {

      paypal.HostedButtons({
        hostedButtonId: "WGE7RR7Y4F43Y",
      }).render("#paypal-container-WGE7RR7Y4F43Y")

        mostrarInfo("Gracias por tu interés en apoyar el proyecto.");
    });

    // Funciones auxiliares para mensajes
    function mostrarError(msg) {
        infoMessage.className = 'alert alert-danger mt-3 small';
        infoMessage.innerText = msg;
        infoMessage.style.display = 'block';
    }

    function mostrarInfo(msg) {
        infoMessage.className = 'alert alert-custom mt-3 small';
        infoMessage.innerText = msg;
        infoMessage.style.display = 'block';
    }

    function ocultarMensaje() {
        infoMessage.style.display = 'none';
    }

    // Inicializar
    playerContainer.style.display = 'none';
    ocultarMensaje();
</script>

</body>

</html>
