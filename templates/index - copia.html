<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTS Studio Pro - Conversor de Voz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border-radius: 15px;
            background-color: #1e1e1e;
            border: 1px solid #333;
        }
        .btn-toggle {
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control, .form-select {
            background-color: #2b2b2b;
            border: 1px solid #444;
            color: white;
        }
        .form-control:focus, .form-select:focus {
            background-color: #333;
            color: white;
            border-color: #0dcaf0;
            box-shadow: none;
        }
        #playerContainer {
            border-top: 1px solid #333;
            margin-top: 20px;
            padding-top: 20px;
        }
        .alert-custom {
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #ffc107;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4 text-info">
                        <i class="fas fa-wave-square me-2"></i>Texto a Audio MP3
                    </h3>

                    <div class="mb-3">
                        <label class="form-label small text-secondary">Tu mensaje:</label>
                        <textarea id="texto" class="form-control" rows="5" placeholder="Escribe o pega el texto que quieres convertir..."></textarea>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <label class="form-label small text-secondary">Voz / Idioma:</label>
                            <select id="voz" class="form-select">
                                {% for nombre, valor in voces.items() %}
                                    <option value="{{ valor }}">{{ nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label small text-secondary">Velocidad: <span id="val_vel" class="text-info">Normal</span></label>
                            <input type="range" id="velocidad" class="form-range" min="-50" max="50" value="0" step="10">
                        </div>
                    </div>

                    <button id="btnMain" onclick="gestionarAccion()" class="btn btn-info w-100 py-3 btn-toggle shadow">
                        <i class="fas fa-magic me-2"></i>GENERAR Y REPRODUCIR
                    </button>

                    <!-- Contenedor del reproductor y descarga -->
                    <div id="playerContainer" style="display:none;" class="text-center">
                        <audio id="audioPlayer" controls style="width: 100%;"></audio>
                        <div class="mt-3">
                            <a id="downloadLink" href="#" download class="btn btn-outline-success btn-sm px-4">
                                <i class="fas fa-download me-2"></i>DESCARGAR MP3
                            </a>
                        </div>
                    </div>

                    <!-- Mensaje de error / información -->
                    <div id="infoMessage" class="alert alert-custom mt-3 small" style="display:none;"></div>
                </div>
            </div>
            <p class="text-center mt-4 text-secondary small">Potenciado por Python & Edge TTS</p>
        </div>
    </div>
</div>

<script>
    // Elementos del DOM
    const audio = document.getElementById('audioPlayer');
    const btnMain = document.getElementById('btnMain');
    const slider = document.getElementById('velocidad');
    const valVel = document.getElementById('val_vel');
    const playerContainer = document.getElementById('playerContainer');
    const downloadLink = document.getElementById('downloadLink');
    const infoMessage = document.getElementById('infoMessage');

    // Variable para controlar si el audio actual está obsoleto (cambió texto/voz/velocidad)
    let audioDirty = false;

    // Actualizar el texto de la velocidad
    slider.oninput = function() {
        let val = parseInt(this.value);
        valVel.innerText = val > 0 ? `+${val}%` : (val < 0 ? `${val}%` : "Normal");
    };

    // Marcar como "sucio" cuando cambia algún parámetro
    document.getElementById('texto').addEventListener('input', () => { audioDirty = true; });
    document.getElementById('voz').addEventListener('change', () => { audioDirty = true; });
    slider.addEventListener('change', () => { audioDirty = true; });

    // Función principal al hacer clic en el botón
    async function gestionarAccion() {
        // 1. Si el audio está sonando, lo detenemos (botón "DETENER")
        if (!audio.paused && audio.src) {
            audio.pause();
            audio.currentTime = 0;
            return; // El evento 'onpause' se encargará de cambiar el botón
        }

        // 2. Si ya hay un audio generado y no está "sucio", simplemente reproducir
        if (audio.src && !audioDirty) {
            try {
                await audio.play();
            } catch (e) {
                mostrarError("Reproducción automática bloqueada. Haz clic en el botón de play del reproductor.");
            }
            return;
        }

        // 3. Generar nuevo audio
        const texto = document.getElementById('texto').value.trim();
        if (!texto) {
            mostrarError("Por favor, ingresa algún texto primero.");
            return;
        }

        // Cambiar estado del botón
        btnMain.disabled = true;
        btnMain.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>PROCESANDO...';
        ocultarMensaje();

        // Preparar FormData
        const formData = new FormData();
        formData.append('texto', texto);
        formData.append('voz', document.getElementById('voz').value);
        const velValue = slider.value;
        formData.append('velocidad', (velValue >= 0 ? "+" : "") + velValue + "%");

        try {
            const response = await fetch('/convertir', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();

            if (data.error) {
                throw new Error(data.error);
            }

            // Asignar nueva fuente al audio
            audio.src = data.url;
            audio.load();  // Importante para que el navegador cargue la nueva URL
            downloadLink.href = data.url;
            playerContainer.style.display = 'block';
            audioDirty = false;  // Ya no está sucio

            // Intentar reproducir automáticamente
            try {
                await audio.play();
            } catch (playError) {
                // Si el navegador bloquea el autoplay, mostramos un mensaje
                mostrarInfo("Reproducción automática bloqueada. Pulsa el botón de play del reproductor.");
            }

        } catch (error) {
            console.error(error);
            mostrarError("Error al generar el audio. Verifica que el servidor esté funcionando.");
        } finally {
            btnMain.disabled = false;
            // El texto del botón se actualizará mediante los eventos del audio
        }
    }

    // --- Eventos del audio para cambiar el botón ---
    audio.onplay = () => {
        btnMain.classList.remove('btn-info');
        btnMain.classList.add('btn-danger');
        btnMain.innerHTML = '<i class="fas fa-stop me-2"></i>DETENER';
    };

    audio.onpause = () => {
        btnMain.classList.remove('btn-danger');
        btnMain.classList.add('btn-info');
        btnMain.innerHTML = '<i class="fas fa-play me-2"></i>REPRODUCIR';
    };

    audio.onended = () => {
        btnMain.classList.remove('btn-danger');
        btnMain.classList.add('btn-info');
        btnMain.innerHTML = '<i class="fas fa-redo me-2"></i>REPETIR';
    };

    audio.onerror = () => {
        mostrarError("Error al cargar el audio. Intenta de nuevo.");
        btnMain.classList.remove('btn-danger');
        btnMain.classList.add('btn-info');
        btnMain.innerHTML = '<i class="fas fa-magic me-2"></i>GENERAR Y REPRODUCIR';
    };

    // Funciones auxiliares para mostrar mensajes
    function mostrarError(msg) {
        infoMessage.className = 'alert alert-danger mt-3 small';
        infoMessage.innerText = msg;
        infoMessage.style.display = 'block';
    }

    function mostrarInfo(msg) {
        infoMessage.className = 'alert alert-custom mt-3 small';
        infoMessage.innerText = msg;
        infoMessage.style.display = 'block';
    }

    function ocultarMensaje() {
        infoMessage.style.display = 'none';
    }

    // Inicializar: ocultar reproductor al cargar
    playerContainer.style.display = 'none';
    ocultarMensaje();

    // Manejar el enlace de descarga: si no hay audio, deshabilitarlo
    downloadLink.addEventListener('click', (e) => {
        if (!audio.src) {
            e.preventDefault();
            mostrarError("Primero genera un audio.");
        }
    });
</script>

</body>
</html>
